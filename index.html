<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>روان ✨</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Amiri', serif;
  background: url("https://i.imgur.com/0Z7IVxB.jpg") center/cover no-repeat;
  color: white;
  text-align: center;
}

/* Moon glow */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.15), transparent 60%);
}

/* Lantern */
.lantern {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 10px gold); }
  to   { filter: drop-shadow(0 0 30px gold); }
}

/* Envelope */
.envelope {
  position: absolute;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  width: 460px;
  padding: 35px;
  background: linear-gradient(135deg, #ff9acb, #ffd6ea);
  border-radius: 22px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.question {
  font-size: 26px;
  color: #4a0033;
  margin-bottom: 20px;
}

button {
  font-family: 'Amiri', serif;
  font-size: 22px;
  padding: 10px 28px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

.yes {
  background: #ff5fa2;
  color: white;
}

.no {
  background: #ccc;
}

.poem {
  font-size: 26px;
  line-height: 1.9;
  color: #4a0033;
  animation: fade 2s forwards;
}

@keyframes fade {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>
</head>

<body>

<img class="lantern" src="https://i.imgur.com/Vw3YQ8N.png">

<div class="envelope" id="envelope">
  <div id="content">
    <div class="question">
      هل تود أن تستمع لشيء مميز؟<br>
      لقد كتبتُ شيئًا لك
    </div>
    <button class="yes" onclick="start()">نعم</button>
    <button class="no" onclick="closeLetter()">لا</button>
  </div>
</div>

<audio id="voice" src="voice.mp3"></audio>
<audio id="music" src="music.mp3" loop></audio>

<script>
const lines = [
"هي ناز خُلِقت لتضيء،",
"وهو ثلج يرى في الاشتعال خطرًا.",
"هي صبح يمشي بخطى واضحة",
"وهو ليل يرتاح في الظلال.",
"لا عيب في الليل",
"ولا نقص في الثلج",
"لكن الشمس إن انطفأت كي لا تذيب الجليد",
"لم تعد شمسًا.",
"تعبت من محاولة الاعتدال بين الاحتراق والتجمد،",
"من أن تقيس وهجها كي لا يذوب ما حولها",
"ومن أن تعتذر عن الضوء كأنه خطيئة"
];

let i = 0;
const content = document.getElementById("content");
const voice = document.getElementById("voice");
const music = document.getElementById("music");

function start() {
  music.play();
  showLine();
}

function showLine() {
  if (i < lines.length) {
    content.innerHTML = `<div class="poem">${lines[i]}</div>`;
    voice.currentTime = 0;
    voice.play();
    i++;
    setTimeout(showLine, 5000);
  }
}

function closeLetter() {
  document.getElementById("envelope").style.display = "none";
}
</script>

</body>
</html>
