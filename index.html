<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>رسالة من روان</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Amiri', serif;
  background: radial-gradient(circle at top, #2c2f6d, #0b0b1f);
  color: white;
  text-align: center;
}

/* Stars */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://i.imgur.com/7b1Yq6H.png");
  opacity: 0.3;
}

/* Lantern */
.lantern {
  position: absolute;
  top: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  animation: glow 3s infinite alternate;
}
@keyframes glow {
  from { filter: drop-shadow(0 0 10px gold); }
  to { filter: drop-shadow(0 0 30px gold); }
}

/* Envelope */
.envelope {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  width: 420px;
  height: 260px;
  background: linear-gradient(135deg, #ffd1e8, #ff9acb);
  border-radius: 16px;
  cursor: pointer;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  transition: transform 1.5s ease;
}

.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 130px;
  background: #ffc0da;
  clip-path: polygon(0 0,100% 0,50% 100%);
  transform-origin: top;
  transition: transform 1.5s ease;
}

.seal {
  position: absolute;
  top: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: #d94f8b;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  color: white;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Letter */
.letter {
  position: absolute;
  top: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  padding: 40px;
  background: #fff8fb;
  color: #3a0033;
  border-radius: 14px;
  opacity: 0;
  font-size: 26px;
  line-height: 2;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  transition: opacity 2s ease;
}

/* Open states */
.open .flap {
  transform: rotateX(180deg);
}
.open {
  transform: translateX(-50%) translateY(-220px);
}
.show {
  opacity: 1;
}

/* Title */
.title {
  position: absolute;
  bottom: 40px;
  width: 100%;
  font-size: 36px;
  opacity: 0.8;
}
.subtitle {
  font-size: 18px;
  opacity: 0.6;
  margin-top: 8px;
}
</style>
</head>

<body>

<img src="https://i.imgur.com/Vw3YQ8N.png" class="lantern">

<div class="envelope" id="envelope">
  <div class="flap"></div>
  <div class="seal">✦</div>
</div>

<div class="letter" id="letter">
  <div id="poem"></div>
</div>

<div class="title">
  رسالة من روان
  <div class="subtitle">المس الظرف لفتح الرسالة</div>
</div>

<!-- AUDIO -->
<audio id="voice" src="voice.mp3"></audio>
<audio id="paper" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7f8e6b4f02.mp3"></audio>
<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_1f6a2c5a0e.mp3" loop></audio>

<script>
const envelope = document.getElementById("envelope");
const letter = document.getElementById("letter");
const poemDiv = document.getElementById("poem");

const voice = document.getElementById("voice");
const paper = document.getElementById("paper");
const music = document.getElementById("music");

const poem = [
"هي ناز خُلِقت لتضيء،",
"وهو ثلج يرى في الاشتعال خطرًا.",
"هي صبح يمشي بخطى واضحة،",
"وهو ليل يرتاح في الظلال.",
"لا عيب في الليل،",
"ولا نقص في الثلج.",
"لكن الشمس إن انطفأت كي لا تذيب الجليد،",
"لم تعد شمسًا.",
"تعبت من محاولة الاعتدال بين الاحتراق والتجمد،",
"من أن تقيس وهجها كي لا يذوب ما حولها،",
"ومن أن تعتذر عن الضوء كأنه خطيئة."
];

let i = 0;

envelope.onclick = () => {
  envelope.classList.add("open");
  paper.play();
  music.volume = 0.4;
  music.play();
  voice.play();

  setTimeout(() => {
    letter.classList.add("show");
    reveal();
  }, 1600);
};

function reveal() {
  if (i < poem.length) {
    poemDiv.innerHTML += poem[i] + "<br>";
    i++;
    setTimeout(reveal, 3200);
  }
}
</script>

</body>
</html>
