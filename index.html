<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رسالة من روان</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Amiri', serif;
  background:radial-gradient(circle at top,#1b1f4d,#050510 70%);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* Stars */
body::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(white 1px, transparent 1px);
  background-size:3px 3px;
  opacity:0.15;
}

/* Crescent Moon */
.moon{
  position:absolute;
  top:80px;
  left:120px;
  width:150px;
  height:150px;
  background:radial-gradient(circle at 30% 30%, #fff8cc, #ffd700);
  border-radius:50%;
  box-shadow:0 0 60px gold;
}
.moon::after{
  content:"";
  position:absolute;
  top:0;
  left:50px;
  width:150px;
  height:150px;
  background:#050510;
  border-radius:50%;
}

/* Author */
.author{
  position:absolute;
  top:40px;
  width:100%;
  text-align:center;
  font-family:'Cinzel', serif;
  font-size:60px;
  letter-spacing:8px;
  color:gold;
  text-shadow:0 0 25px gold;
}

/* Envelope */
.envelope{
  width:400px;
  height:250px;
  background:linear-gradient(135deg,#ffd6ec,#ff9ecf);
  border-radius:15px;
  position:relative;
  cursor:pointer;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  transition:1.5s;
}

.flap{
  position:absolute;
  width:100%;
  height:125px;
  background:#ffc1e0;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.5s;
}

.seal{
  position:absolute;
  top:95px;
  left:50%;
  transform:translateX(-50%);
  width:60px;
  height:60px;
  background:gold;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#550033;
  font-size:22px;
}

/* Letter Template */
.letter{
  position:absolute;
  width:650px;
  background:#fffaf0;
  border:8px solid #d4af37;
  padding:60px;
  border-radius:12px;
  color:#3a0033;
  font-size:28px;
  line-height:2.2;
  box-shadow:0 30px 80px rgba(0,0,0,0.7);
  opacity:0;
  transform:translateY(50px) scale(0.9);
  transition:1.8s;
}

.letter::before{
  content:"";
  position:absolute;
  inset:15px;
  border:2px dashed #d4af37;
  border-radius:8px;
}

/* Open animation */
.open .flap{transform:rotateX(180deg);}
.open{transform:translateY(-200px);}
.show{
  opacity:1;
  transform:translateY(0) scale(1);
}

/* Line animation */
.line{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 2s forwards;
}
@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="moon"></div>
<div class="author">RAWAN</div>

<div class="envelope" id="envelope">
  <div class="flap"></div>
  <div class="seal">✦</div>
</div>

<div class="letter" id="letter">
  <div id="poem"></div>
</div>

<audio id="voice" src="voice.mp3"></audio>
<audio id="paper" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7f8e6b4f02.mp3"></audio>

<script>
const poem=[
"هي ناز خُلِقت لتضيء،",
"وهو ثلج يرى في الاشتعال خطرًا.",
"هي صبح يمشي بخطى واضحة،",
"وهو ليل يرتاح في الظلال.",
"لا عيب في الليل،",
"ولا نقص في الثلج.",
"لكن الشمس إن انطفأت كي لا تذيب الجليد،",
"لم تعد شمسًا.",
"تعبت من محاولة الاعتدال بين الاحتراق والتجمد،",
"ومن أن تقيس وهجها كي لا يذوب ما حولها،",
"ومن أن تعتذر عن الضوء كأنه خطيئة."
];

let i=0;
const envelope=document.getElementById("envelope");
const letter=document.getElementById("letter");
const poemDiv=document.getElementById("poem");
const voice=document.getElementById("voice");
const paper=document.getElementById("paper");

envelope.onclick=()=>{
  envelope.classList.add("open");
  paper.play();
  voice.play();
  setTimeout(()=>{
    letter.classList.add("show");
    reveal();
  },1500);
};

function reveal(){
  if(i<poem.length){
    let line=document.createElement("div");
    line.className="line";
    line.style.animationDelay="0s";
    line.innerText=poem[i];
    poemDiv.appendChild(line);
    i++;
    setTimeout(reveal,3200);
  }
}
</script>

</body>
</html>
