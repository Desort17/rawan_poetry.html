<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Rawan ✨</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri&display=swap');

body {
  margin: 0;
  overflow: hidden;
  font-family: 'Amiri', serif;
  background: radial-gradient(circle at top, #1b0033, #000);
  color: white;
  text-align: center;
}

.lantern {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  animation: glow 3s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 10px gold); }
  to   { filter: drop-shadow(0 0 30px gold); }
}

.envelope {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 460px;
  padding: 40px;
  background: linear-gradient(135deg, #ff9acb, #ffd1e8);
  border-radius: 22px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

.question {
  font-size: 26px;
  color: #4a0033;
  margin-bottom: 25px;
}

button {
  font-family: 'Amiri', serif;
  font-size: 22px;
  padding: 10px 28px;
  margin: 10px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
}

.yes {
  background: #ff5fa2;
  color: white;
}

.no {
  background: #bbb;
}

.poem {
  font-size: 26px;
  line-height: 1.9;
  color: #4a0033;
  opacity: 0;
  animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.flower {
  position: absolute;
  top: -50px;
  font-size: 24px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

.rawan {
  position: absolute;
  font-size: 22px;
  color: #ffb6d9;
  opacity: 0.6;
}
</style>
</head>

<body>

<img class="lantern" src="https://i.imgur.com/Vw3YQ8N.png">

<div class="envelope" id="envelope">
  <div id="content">
    <div class="question">
      هل تود أن تستمع لشيء مميز؟<br>
      لقد كتبتُ شيئًا لك
    </div>
    <button class="yes" onclick="startPoem()">نعم</button>
    <button class="no" onclick="closeLetter()">لا</button>
  </div>
</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7f8e6b4f02.mp3">
</audio>

<script>
const poemLines = [
"هي ناز خُلِقت لتضيء،",
"وهو ثلج يرى في الاشتعال خطرًا.",
"هي صبح يمشي بخطى واضحة",
"وهو ليل يرتاح في الظلال.",
"لا عيب في الليل",
"ولا نقص في الثلج",
"لكن الشمس إن انطفأت كي لا تذيب الجليد",
"لم تعد شمسًا.",
"تعبت من محاولة الاعتدال بين الاحتراق والتجمد،",
"من أن تقيس وهجها كي لا يذوب ما حولها",
"ومن أن تعتذر عن الضوء كأنه خطيئة"
];

let index = 0;
const content = document.getElementById("content");
const music = document.getElementById("music");

function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "ar-SA";
  msg.rate = 0.85;
  msg.pitch = 1.2;
  speechSynthesis.speak(msg);
}

function startPoem() {
  music.play();
  showLine();
}

function showLine() {
  if (index < poemLines.length) {
    content.innerHTML = `<div class="poem">${poemLines[index]}</div>`;
    speak(poemLines[index]);
    index++;
    setTimeout(showLine, 4500);
  }
}

function closeLetter() {
  document.getElementById("envelope").style.display = "none";
}

/* Flowers */
setInterval(() => {
  const f = document.createElement("div");
  f.className = "flower";
  f.innerText = "🌸";
  f.style.left = Math.random() * 100 + "vw";
  f.style.animationDuration = (6 + Math.random() * 5) + "s";
  document.body.appendChild(f);
  setTimeout(() => f.remove(), 11000);
}, 450);

/* Rawan floating */
for (let i = 0; i < 12; i++) {
  const r = document.createElement("div");
  r.className = "rawan";
  r.innerText = "RAWAN";
  r.style.left = Math.random() * 100 + "vw";
  r.style.top = Math.random() * 100 + "vh";
  document.body.appendChild(r);
}
</script>

</body>
</html>
