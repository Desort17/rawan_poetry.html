<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>رسالة من روان</title>

<!-- Arabic Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Scheherazade+New:wght@700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Amiri', serif;
  overflow:hidden;
  height:100vh;
  background:
  radial-gradient(circle at top, rgba(20,25,70,0.9), #050510),
  url("https://images.unsplash.com/photo-1524492449090-1c5b2c8b7f6e?auto=format&fit=crop&w=1920&q=80");
  background-size:cover;
  background-position:center;
  color:white;
}

/* Crescent Moon */
.moon{
  position:absolute;
  top:60px;
  left:100px;
  width:140px;
  height:140px;
  background:radial-gradient(circle at 30% 30%, #fff8cc, #ffd700);
  border-radius:50%;
  box-shadow:0 0 60px gold;
}
.moon:after{
  content:"";
  position:absolute;
  top:0;
  left:40px;
  width:140px;
  height:140px;
  background:#050510;
  border-radius:50%;
}

/* Lanterns */
.lantern{
  position:absolute;
  width:80px;
  animation:float 4s ease-in-out infinite alternate;
  filter:drop-shadow(0 0 20px gold);
}
.l1{top:50px; right:150px;}
.l2{top:80px; right:350px;}
@keyframes float{
  from{transform:translateY(0)}
  to{transform:translateY(20px)}
}

/* Flower rain */
.flower{
  position:absolute;
  width:20px;
  height:20px;
  background:radial-gradient(circle, pink, transparent);
  border-radius:50%;
  animation:fall linear infinite;
}
@keyframes fall{
  from{transform:translateY(-50px)}
  to{transform:translateY(110vh)}
}

/* Author Name */
.author{
  position:absolute;
  top:30px;
  width:100%;
  text-align:center;
  font-family:'Scheherazade New', serif;
  font-size:70px;
  color:gold;
  text-shadow:0 0 20px gold;
  letter-spacing:5px;
}

/* Envelope */
.envelope{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  width:420px;
  height:260px;
  background:linear-gradient(135deg,#ffd6ec,#ff9ecf);
  border-radius:15px;
  cursor:pointer;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  transition:1.5s;
}
.flap{
  position:absolute;
  width:100%;
  height:130px;
  background:#ffc1e0;
  clip-path:polygon(0 0,100% 0,50% 100%);
  transform-origin:top;
  transition:1.5s;
}
.seal{
  position:absolute;
  top:105px;
  left:50%;
  transform:translateX(-50%);
  width:60px;
  height:60px;
  border-radius:50%;
  background:gold;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#550033;
  font-size:22px;
}

/* Letter */
.letter{
  position:absolute;
  top:18%;
  left:50%;
  transform:translateX(-50%);
  width:650px;
  background:#fffaf3;
  color:#3a0033;
  padding:50px;
  border-radius:15px;
  font-size:28px;
  line-height:2.2;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
  opacity:0;
  transition:2s;
}

/* Open animation */
.open .flap{transform:rotateX(180deg);}
.open{transform:translate(-50%,-70%);}
.show{opacity:1;}
</style>
</head>

<body>

<div class="moon"></div>

<div class="author">RAWAN</div>

<img src="https://i.imgur.com/Vw3YQ8N.png" class="lantern l1">
<img src="https://i.imgur.com/Vw3YQ8N.png" class="lantern l2">

<div class="envelope" id="envelope">
  <div class="flap"></div>
  <div class="seal">✦</div>
</div>

<div class="letter" id="letter">
  <div id="poem"></div>
</div>

<audio id="voice" src="voice.mp3"></audio>
<audio id="paper" src="https://cdn.pixabay.com/audio/2022/03/15/audio_7f8e6b4f02.mp3"></audio>

<script>
/* Flower rain generator */
for(let i=0;i<25;i++){
  let f=document.createElement("div");
  f.className="flower";
  f.style.left=Math.random()*100+"vw";
  f.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(f);
}

const poem=[
"هي ناز خُلِقت لتضيء،",
"وهو ثلج يرى في الاشتعال خطرًا.",
"هي صبح يمشي بخطى واضحة،",
"وهو ليل يرتاح في الظلال.",
"لا عيب في الليل،",
"ولا نقص في الثلج.",
"لكن الشمس إن انطفأت كي لا تذيب الجليد،",
"لم تعد شمسًا.",
"تعبت من محاولة الاعتدال بين الاحتراق والتجمد،",
"ومن أن تقيس وهجها كي لا يذوب ما حولها،",
"ومن أن تعتذر عن الضوء كأنه خطيئة."
];

let i=0;
const envelope=document.getElementById("envelope");
const letter=document.getElementById("letter");
const poemDiv=document.getElementById("poem");
const voice=document.getElementById("voice");
const paper=document.getElementById("paper");

envelope.onclick=()=>{
  envelope.classList.add("open");
  paper.play();
  voice.play();
  setTimeout(()=>{
    letter.classList.add("show");
    reveal();
  },1600);
};

function reveal(){
  if(i<poem.length){
    poemDiv.innerHTML+=poem[i]+"<br>";
    i++;
    setTimeout(reveal,3200);
  }
}
</script>

</body>
</html>
